# A self-contained example: a fake external source produces a hardcoded catalog
# that feeds the external Markdown emitter. No database required.

[source]
type = "external"
command = ["python3", "fake_source.py"]
timeout = 60 # would kill the introspection if it took more than 60 seconds
schemas = ["public"]

[[emitter]]
type = "external"
command = ["python3", "markdown_emitter.py"]
out_dir = "generated"
